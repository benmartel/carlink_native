build:
  maxIssues: -1  # Report all, don't fail

complexity:
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  CyclomaticComplexMethod:
    threshold: 20
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 25

style:
  MagicNumber:
    active: false  # Too noisy for protocol code with hex constants
  WildcardImport:
    active: false
  ReturnCount:
    max: 5
  MaxLineLength:
    maxLineLength: 140

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  VariableNaming:
    variablePattern: '[a-zA-Z_][a-zA-Z0-9_]*'

potential-bugs:
  UnsafeCast:
    active: true
  CastToNullableType:
    active: true

performance:
  SpreadOperator:
    active: false  # Common in vararg calls
