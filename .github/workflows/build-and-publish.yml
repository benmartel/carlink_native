name: Build & Publish to Google Play Internal Testing

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build Release AAB & Upload to Play Store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Patch applicationId and content provider
        run: |
          sed -i "s|applicationId = \"zeno.carlink\"|applicationId = \"${{ secrets.APP_ID }}\"|g" app/build.gradle.kts
          sed -i "s|com.google.android.apps.automotive.templates.host.ClusterIconContentProvider|${{ secrets.APP_ID }}.ClusterIconContentProvider|g" app/src/main/AndroidManifest.xml
          NEW_VERSION_CODE=$((103 + ${{ github.run_number }}))
          sed -i "s|versionCode = 103|versionCode = ${NEW_VERSION_CODE}|g" app/build.gradle.kts
          echo "Applied applicationId: ${{ secrets.APP_ID }}, versionCode: ${NEW_VERSION_CODE}"

      - name: Build release bundle
        run: ./gradlew bundleRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
                  env:
                            BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/
          retention-days: 14

      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.APP_ID }}
          releaseFiles: ${{ steps.sign_aab.outputs.signedReleaseFile }}
          track: internal
          status: completed
          changesNotSentForReview: true
