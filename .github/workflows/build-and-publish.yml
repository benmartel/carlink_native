name: Build & Publish to Google Play Internal Testing

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    name: Build Release AAB & Upload to Play Store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Patch applicationId and content provider
        run: |
          sed -i -E "s|applicationId = \"[^\"]*\"|applicationId = \"${{ secrets.APP_ID }}\"|g" app/build.gradle.kts
          sed -i -E "s|[a-zA-Z0-9.]+\.ClusterIconContentProvider|${{ secrets.APP_ID }}.ClusterIconContentProvider|g" app/src/main/AndroidManifest.xml
          NEW_VERSION_CODE=$((200 + ${{ github.run_number }}))
          sed -i "s|versionCode = [0-9]*|versionCode = ${NEW_VERSION_CODE}|g" app/build.gradle.kts
          echo "Applied applicationId: ${{ secrets.APP_ID }}, versionCode: ${NEW_VERSION_CODE}"

      - name: Build release bundle
        run: ./gradlew bundleRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Sign AAB
        run: |
          jarsigner \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore $GITHUB_WORKSPACE/release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/
          retention-days: 14

      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.APP_ID }}
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
          changesNotSentForReview: true
